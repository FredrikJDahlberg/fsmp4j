name: Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Build and publish
        run: ./gradlew :fsmp4j:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
